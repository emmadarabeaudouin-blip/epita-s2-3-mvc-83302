name: Test & Publish Coverage (xUnit + ReportGenerator)

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

# Avoid overlapping Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

# Required for GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"
  # ✏️  Point this to your xUnit test project (.csproj)
  TEST_PROJECT: "VgcCollege.Tests/VgcCollege.Tests.csproj"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # xUnit + Coverlet data collector
      - name: Test (xUnit) and collect coverage
        run: >
          dotnet test $TEST_PROJECT -c Release --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      # Generate full HTML report AND a Cobertura summary for the badge
      - name: Generate HTML coverage report
        run: |
          export PATH="$PATH:~/.dotnet/tools"
          reportgenerator \
            -reports:**/coverage.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:"Html;Cobertura"

      # Parse line coverage % from the Cobertura XML and write a summary card
      - name: Extract and display line coverage
        id: coverage
        run: |
          export PATH="$PATH:~/.dotnet/tools"

          # Pull line-rate from the merged Cobertura report (0.00-1.00)
          LINE_RATE=$(grep -oP '(?<=line-rate=")[^"]+' coveragereport/Cobertura.xml | head -1)
          PCT=$(python3 -c "print(f'{float('$LINE_RATE') * 100:.1f}')")

          # Pick a colour based on the percentage
          COLOR=$(python3 -c "
          pct = float('$PCT')
          print('brightgreen' if pct >= 80 else 'yellow' if pct >= 60 else 'red')
          ")

          echo "line_coverage=$PCT"  >> $GITHUB_OUTPUT
          echo "badge_color=$COLOR"  >> $GITHUB_OUTPUT

          # Write a summary card visible in the Actions run view
          echo "## Line Coverage: ${PCT}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "![Coverage](https://img.shields.io/badge/Line%20Coverage-${PCT}%25-${COLOR})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full interactive report is published to GitHub Pages on pushes to main/master." >> $GITHUB_STEP_SUMMARY

      # Inject a visible coverage summary banner at the top of the HTML report
      - name: Inject coverage summary into report index
        run: |
          PCT="${{ steps.coverage.outputs.line_coverage }}"
          COLOR="${{ steps.coverage.outputs.badge_color }}"
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          if [ "$COLOR" = "brightgreen" ]; then HEX="#22c55e"
          elif [ "$COLOR" = "yellow" ]; then HEX="#eab308"
          else HEX="#ef4444"
          fi

          python3 - <<PYEOF
          pct  = "$PCT"
          hex  = "$HEX"
          date = "$DATE"

          banner = (
            '<div style="font-family:sans-serif;background:#f0f4f8;border-left:6px solid ' + hex + ';'
            'padding:16px 24px;margin-bottom:24px;border-radius:4px;display:flex;align-items:center;gap:16px;">'
            '<span style="font-size:2rem;">&#128202;</span>'
            '<div>'
            '<div style="font-size:1.4rem;font-weight:700;color:#1e293b;">Line Coverage: ' + pct + '%</div>'
            '<div style="font-size:0.9rem;color:#64748b;margin-top:4px;">Generated by ReportGenerator &middot; ' + date + '</div>'
            '</div></div>'
          )

          path = "coveragereport/index.html"
          html = open(path).read()
          html = html.replace("<body>", "<body>" + banner, 1)
          open(path, "w").write(html)
          PYEOF

      # Always upload HTML report as a downloadable artifact (available on PRs too)
      - name: Upload coverage as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coveragereport

      # Only package for Pages when pushing to main/master
      - name: Upload Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coveragereport

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
